<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkMe Tutorial Overlay</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: transparent;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    /* Transparent page so original LinkMe behind stays visible */
    .page {
      min-height: 100vh;
      position: relative;
      background: transparent;
    }

    /* Tutorial overlay */
    .tutorial {
      position: fixed;
      left: 14px;
      right: 14px;
      top: 70px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 16px 16px 18px;
      animation: fadeInUp 0.45s ease;
    }

    .tutorial.hidden {
      display: none;
    }

    .tutorial-head {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 14px;
    }

    .tutorial-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-align: center;
      color: #fff;
    }

    .close-btn {
      position: absolute;
      right: 0;
      top: -4px;
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 28px;
      cursor: pointer;
    }

    .slide {
      position: relative;
      height: 190px;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 14px;
    }

    .slide-frame {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .slide-frame.active {
      opacity: 1;
      transform: scale(1);
    }

    .demo-ui {
      width: 100%;
      height: 100%;
      position: relative;
      background: linear-gradient(180deg, #efefef, #dcdcdc);
      color: #111;
      overflow: hidden;
    }

    .demo-topbar {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      font-size: 22px;
      font-weight: 700;
    }

    .demo-url {
      text-align: center;
      font-size: 14px;
      color: #6e6e6e;
      margin-top: -4px;
    }

    .menu-sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: white;
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      padding: 14px 18px 16px;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.18);
      transform: translateY(100%);
      opacity: 0;
    }

    .menu-sheet.show {
      animation: sheetUp 0.75s ease forwards;
    }

    .menu-item {
      padding: 12px 0;
      font-size: 18px;
      border-bottom: 1px solid #ececec;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #111;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    /* Small animated arrows */
    .arrow-wrap {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 6px;
      animation: floatArrow 1s ease-in-out infinite;
      z-index: 5;
    }

    .arrow-label {
      background: #ff2a2a;
      color: white;
      font-size: 14px;
      font-weight: 800;
      padding: 5px 8px;
      border-radius: 8px;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(255,42,42,0.28);
    }

    .arrow-shape {
      color: #ff2a2a;
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 8px 18px rgba(255,42,42,0.25);
    }

    .arrow-dots {
      right: 18px;
      top: 42px;
      transform: rotate(-8deg);
    }

    .arrow-browser {
      right: 48px;
      top: 92px;
      transform: rotate(-8deg);
    }

    .check-wrap {
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #98f4c5;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 68px;
      font-weight: 900;
      box-shadow: 0 0 36px rgba(152,244,197,0.32);
      animation: popCheck 0.6s ease;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 6px 0 16px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transform: translateY(10px);
      animation: stepIn 0.55s forwards;
    }

    .step:nth-child(1) { animation-delay: 0.2s; }
    .step:nth-child(2) { animation-delay: 0.5s; }

    .step-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ff3ab7, #a341ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: white;
      flex: 0 0 auto;
      box-shadow: 0 6px 16px rgba(195,70,255,0.35);
    }

    .step-text {
      font-size: 16px;
      line-height: 1.4;
      color: white;
    }

    .gotit-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 18px 16px;
      font-size: 18px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg, #ff39a7, #9f49ff);
      box-shadow: 0 8px 24px rgba(198,70,255,0.28);
      animation: glowBtn 1.7s infinite alternate;
    }

    .progress {
      margin-top: 12px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff39a7, #9f49ff);
      animation: loadBar 10s linear forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes stepIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glowBtn {
      from { box-shadow: 0 8px 24px rgba(198,70,255,0.20); }
      to { box-shadow: 0 10px 32px rgba(255,57,167,0.38); }
    }

    @keyframes loadBar {
      from { width: 0%; }
      to { width: 100%; }
    }

    @keyframes floatArrow {
      0%,100% { transform: translateY(0) rotate(-8deg); }
      50% { transform: translateY(-6px) rotate(-8deg); }
    }

    @keyframes sheetUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes popCheck {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 430px) {
      .tutorial {
        left: 10px;
        right: 10px;
        top: 62px;
      }

      .slide {
        height: 178px;
      }

      .tutorial-title {
        font-size: 15px;
      }

      .step-text {
        font-size: 15px;
      }

      .arrow-label {
        font-size: 12px;
        padding: 4px 7px;
      }

      .arrow-shape {
        font-size: 24px;
      }

      .arrow-browser {
        right: 38px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="tutorial" id="tutorial">
      <div class="tutorial-head">
        <div class="tutorial-title">FOLLOW THE TUTORIAL 👇</div>
        <button class="close-btn" id="closeBtn">×</button>
      </div>

      <div class="slide">
        <!-- Frame 1 -->
        <div class="slide-frame active" id="frame1">
          <div class="demo-ui">
            <div class="demo-topbar">
              <span>←</span>
              <span>×</span>
              <span>⋯</span>
            </div>
            <div class="demo-url">link page</div>

            <div class="arrow-wrap arrow-dots">
              <div class="arrow-label">HERE</div>
              <div class="arrow-shape">➜</div>
            </div>
          </div>
        </div>

        <!-- Frame 2 -->
        <div class="slide-frame" id="frame2">
          <div class="demo-ui">
            <div class="demo-topbar">
              <span>←</span>
              <span>×</span>
              <span>⋯</span>
            </div>
            <div class="demo-url">link page</div>

            <div class="menu-sheet" id="menuSheet">
              <div class="menu-item">⚑ Report</div>
              <div class="menu-item"><strong>🌐 Open in browser</strong></div>
              <div class="menu-item">🔗 Copy Link</div>
            </div>

            <div class="arrow-wrap arrow-browser">
              <div class="arrow-label">HERE</div>
              <div class="arrow-shape">➜</div>
            </div>
          </div>
        </div>

        <!-- Frame 3 -->
        <div class="slide-frame" id="frame3">
          <div class="check-wrap">
            <div class="check-circle">✓</div>
          </div>
        </div>
      </div>

      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-text">Tap the 3 dots</div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-text">Choose "Open in browser"</div>
        </div>
      </div>

      <button class="gotit-btn" id="gotItBtn">GOT IT</button>
      <div class="progress">
        <div class="progress-bar"></div>
      </div>
    </div>
  </div>

  <script>
    const tutorial = document.getElementById('tutorial');
    const closeBtn = document.getElementById('closeBtn');
    const gotItBtn = document.getElementById('gotItBtn');
    const frame1 = document.getElementById('frame1');
    const frame2 = document.getElementById('frame2');
    const frame3 = document.getElementById('frame3');
    const menuSheet = document.getElementById('menuSheet');

    function showFrame(frameToShow) {
      [frame1, frame2, frame3].forEach(frame => frame.classList.remove('active'));
      frameToShow.classList.add('active');
    }

    setTimeout(() => {
      showFrame(frame2);
      setTimeout(() => {
        menuSheet.classList.add('show');
      }, 150);
    }, 3000);

    setTimeout(() => {
      showFrame(frame3);
    }, 6800);

    function closeTutorial() {
      tutorial.classList.add('hidden');
    }

    closeBtn.addEventListener('click', closeTutorial);
    gotItBtn.addEventListener('click', closeTutorial);

    setTimeout(() => {
      closeTutorial();
    }, 10000);
  </script>
</body>
</html>
