<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Page</title>
  <style>
    :root{
      --bg:#0b0b10;
      --card:#15151d;
      --card-2:#1d1d28;
      --text:#ffffff;
      --muted:#b8b8c7;
      --accent:#ff2f7d;
      --accent-2:#ff5ea1;
      --border:rgba(255,255,255,0.08);
      --shadow:0 20px 60px rgba(0,0,0,0.45);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:#0b0b10;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .main{
      width:100%;
      max-width:400px;
    }

    .link{
      display:flex;
      justify-content:space-between;
      padding:15px;
      margin:10px;
      background:#1a1a22;
      border-radius:15px;
      text-decoration:none;
      color:white;
    }

    /* OVERLAY */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.8);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .card{
      background:#111;
      padding:20px;
      border-radius:20px;
      text-align:center;
      width:90%;
      max-width:350px;
    }

    .count{
      font-size:14px;
      margin-bottom:10px;
      opacity:0.7;
    }

    .steps{
      text-align:left;
      margin-top:15px;
    }

    .step{
      margin:10px 0;
    }

    button{
      margin-top:15px;
      padding:10px;
      width:100%;
      border:none;
      border-radius:10px;
      background:#ff2f7d;
      color:white;
      font-weight:bold;
    }

    .close{
      position:absolute;
      top:10px;
      right:15px;
      font-size:20px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="main">
  <a class="link" href="https://fanvue.com/lunafrost" target="_blank">🔥 VIP PAGE →</a>
  <a class="link" href="https://instagram.com/lunaa_frostt" target="_blank">📸 Instagram →</a>
  <a class="link" href="https://tiktok.com/@lunaa.frost" target="_blank">🎵 TikTok →</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="card">
    <div class="close" onclick="closeOverlay()">✕</div>
    <div class="count" id="count">Closing in 10s</div>

    <h2>How to open links</h2>

    <div class="steps">
      <div class="step">1. Tap the link</div>
      <div class="step">2. Copy if not opening</div>
      <div class="step">3. Paste in browser</div>
    </div>

    <button onclick="closeOverlay()">Continue</button>
  </div>
</div>

<script>
let seconds = 10;
const count = document.getElementById("count");
const overlay = document.getElementById("overlay");

const timer = setInterval(()=>{
  seconds--;
  count.innerText = "Closing in " + seconds + "s";

  if(seconds <= 0){
    clearInterval(timer);
    closeOverlay();
  }
},1000);

function closeOverlay(){
  overlay.style.display = "none";
}
</script>

</body>
</html>
