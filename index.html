<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open in browser</title>

<style>
body {
  margin:0;
  background:#0a0a0a;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box {
  text-align:center;
  max-width:340px;
}

.icon {
  font-size:50px;
  margin-bottom:20px;
  opacity:0.9;
}

.title {
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}

.subtitle {
  font-size:14px;
  color:#aaa;
  margin-bottom:25px;
}

.link-box {
  background:#1c1c1c;
  padding:12px;
  border-radius:10px;
  font-size:13px;
  color:#ccc;
  word-break:break-all;
  margin-bottom:20px;
}

.btn {
  width:100%;
  padding:14px;
  background:#ff2e7a;
  border:none;
  border-radius:10px;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover {
  background:#e0266a;
}

.arrow {
  margin-top:20px;
  font-size:30px;
  animation:bounce 1.2s infinite;
}

@keyframes bounce {
  0%,100% {transform:translateY(0);}
  50% {transform:translateY(10px);}
}
</style>

</head>

<body>

<div class="box">

<div class="icon">🔒</div>

<div class="title">Open this link in your browser</div>

<div class="subtitle">
TikTok can't open this page directly.<br>
Copy and open it in Safari / Chrome
</div>

<div class="link-box">
fanvue.com/yourpage
</div>

<a href="ВСТАВЬ_СВОЮ_ССЫЛКУ_FANVUE" target="_blank">
  <button class="btn">OPEN FANVUE 🔞</button>
</a>

<div class="arrow">⬇️</div>

</div>

</body>
</html>
