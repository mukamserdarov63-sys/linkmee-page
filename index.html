<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Page</title>

<style>
body{
  margin:0;
  background:#0b0b10;
  font-family:Arial;
  color:white;
}

/* MAIN PAGE */
.main{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.link{
  background:#1a1a22;
  padding:15px;
  margin:10px;
  border-radius:15px;
  text-decoration:none;
  color:white;
  width:260px;
  text-align:center;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.box{
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:340px;
  text-align:center;
  position:relative;
}

/* CLOSE */
.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:20px;
  cursor:pointer;
}

/* TIMER */
.timer{
  position:absolute;
  top:10px;
  left:15px;
  font-size:14px;
  opacity:0.6;
}

/* STEPS */
.step{
  margin:12px 0;
  opacity:0;
  animation:fade 0.5s forwards;
}

.step:nth-child(3){animation-delay:1s;}
.step:nth-child(4){animation-delay:2s;}
.step:nth-child(5){animation-delay:3s;}

@keyframes fade{
  to{opacity:1;}
}

/* BUTTONS */
.buttons{
  margin-top:15px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.continue{
  background:#ff2f7d;
  color:white;
}

.back{
  background:#333;
  color:white;
}
</style>
</head>

<body>

<div class="main">
  <a class="link" href="#">🔥 VIP PAGE</a>
  <a class="link" href="#">📸 Instagram</a>
  <a class="link" href="#">🎵 TikTok</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">

<div class="box">

<div class="timer" id="timer">10s</div>
<div class="close" onclick="closeOverlay()">✕</div>

<h2>How to open link</h2>

<div class="step">1. Copy the link</div>
<div class="step">2. Open browser</div>
<div class="step">3. Paste and open</div>

<div class="buttons">
  <button class="back" onclick="closeOverlay()">Back</button>
  <button class="continue" onclick="closeOverlay()">Continue</button>
</div>

</div>
</div>

<script>
let time = 10;
const timer = document.getElementById("timer");
const overlay = document.getElementById("overlay");

const countdown = setInterval(()=>{
  time--;
  timer.innerText = time + "s";

  if(time <= 0){
    clearInterval(countdown);
    closeOverlay();
  }
},1000);

function closeOverlay(){
  overlay.style.display = "none";
}
</script>

</body>
</html>
