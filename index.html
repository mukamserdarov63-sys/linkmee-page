<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Page</title>

<style>
body{
  margin:0;
  background:#0a0a0f;
  font-family:Inter, Arial;
  color:white;
  overflow:hidden;
}

/* MAIN PAGE */
.main{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.link{
  background:linear-gradient(145deg,#1a1a25,#111);
  padding:16px;
  margin:10px;
  border-radius:16px;
  text-decoration:none;
  color:white;
  width:260px;
  text-align:center;
  font-weight:600;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(5,5,10,0.95);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.box{
  width:90%;
  max-width:340px;
  text-align:center;
}

/* PROGRESS BAR */
.progress{
  position:absolute;
  top:0;
  left:0;
  height:4px;
  width:100%;
  background:#222;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff2f7d,#ff5ea1);
  animation:load 10s linear forwards;
}

@keyframes load{
  to{width:100%;}
}

/* CLOSE */
.close{
  position:absolute;
  top:15px;
  right:20px;
  font-size:20px;
  opacity:0.7;
  cursor:pointer;
}

/* TITLE */
h2{
  margin-top:50px;
  font-size:22px;
}

/* STEPS */
.step{
  opacity:0;
  margin:15px 0;
  font-size:16px;
  animation:fade 0.6s forwards;
}

.step:nth-child(3){animation-delay:1s;}
.step:nth-child(4){animation-delay:2s;}
.step:nth-child(5){animation-delay:3s;}

@keyframes fade{
  to{opacity:1;}
}

/* BUTTON */
button{
  margin-top:25px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:14px;
  background:linear-gradient(145deg,#ff2f7d,#e72671);
  color:white;
  font-weight:bold;
  font-size:15px;
}
</style>
</head>

<body>

<div class="main">
  <a class="link" href="https://fanvue.com/lunafrost" target="_blank">🔥 VIP PAGE</a>
  <a class="link" href="https://instagram.com/lunaa_frostt" target="_blank">📸 Instagram</a>
  <a class="link" href="https://tiktok.com/@lunaa.frost" target="_blank">🎵 TikTok</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">

<div class="progress">
  <div class="progress-bar"></div>
</div>

<div class="close" onclick="closeOverlay()">✕</div>

<div class="box">

<h2>Open in browser</h2>

<div class="step">1. Copy this link</div>
<div class="step">2. Open your browser</div>
<div class="step">3. Paste & continue</div>

<button onclick="closeOverlay()">Continue</button>

</div>
</div>

<script>
setTimeout(()=>{
  closeOverlay();
},10000);

function closeOverlay(){
  document.getElementById("overlay").style.display="none";
}
</script>

</body>
</html>
